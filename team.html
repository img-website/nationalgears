<!DOCTYPE html>
<html lang="en" class="md:text-[1vw]">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Team | National Gears - Engineering Specialists</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#002045',
                        secondary: '#f59e0b',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="./public/css/style.css">
</head>

<body class="font-['Google_Sans'] bg-slate-50 overflow-x-hidden">
    <div id="header-root"></div>

    <main class="pt-40">
        <div class="max-w-8xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
            <div class="text-center mb-20">
                <div
                    class="inline-flex items-center gap-3 px-4 py-2 bg-primary/5 border border-primary/10 rounded-full text-primary text-[10px] font-black uppercase tracking-[0.3em] mb-8">
                    <span class="w-2 h-2 rounded-full bg-amber-500"></span> Professional Staff
                </div>
                <h1 class="text-6xl md:text-8xl font-black text-slate-900 mb-8 tracking-tighter leading-none uppercase">
                    OUR <span
                        class="text-transparent bg-clip-text bg-gradient-to-r from-primary to-blue-600">SPECIALISTS</span>
                </h1>
                <p class="max-w-3xl mx-auto text-slate-500 text-xl font-light leading-relaxed">
                    Behind every precision gear is a team of dedicated specialists committed to engineering excellence.
                </p>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                <!-- Team Member 1 -->
                <div class="group">
                    <div
                        class="relative aspect-[4/5] rounded-[2.5rem] overflow-hidden mb-6 shadow-sm group-hover:shadow-xl transition-all duration-500 group-hover:-translate-y-2">
                        <img src="https://images.unsplash.com/photo-1560250097-0b93528c311a?auto=format&fit=crop&q=80&w=400"
                            alt="Team Member"
                            class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700">
                        <div
                            class="absolute inset-0 bg-gradient-to-t from-primary/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-all duration-500 flex flex-col justify-end p-8">
                            <div class="flex gap-4">
                                <a href="#"
                                    class="w-10 h-10 rounded-xl bg-white/20 backdrop-blur-md flex items-center justify-center text-white hover:bg-amber-500 transition-all"><i
                                        data-lucide="linkedin" class="w-4 h-4"></i></a>
                                <a href="#"
                                    class="w-10 h-10 rounded-xl bg-white/20 backdrop-blur-md flex items-center justify-center text-white hover:bg-amber-500 transition-all"><i
                                        data-lucide="mail" class="w-4 h-4"></i></a>
                            </div>
                        </div>
                    </div>
                    <h3 class="text-2xl font-black text-slate-900 tracking-tight">John Doe</h3>
                    <p class="text-primary font-bold text-xs uppercase tracking-widest mt-1">Lead Production Engineer
                    </p>
                </div>

                <!-- Team Member 2 -->
                <div class="group">
                    <div
                        class="relative aspect-[4/5] rounded-[2.5rem] overflow-hidden mb-6 shadow-sm group-hover:shadow-xl transition-all duration-500 group-hover:-translate-y-2">
                        <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?auto=format&fit=crop&q=80&w=400"
                            alt="Team Member"
                            class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700">
                        <div
                            class="absolute inset-0 bg-gradient-to-t from-primary/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-all duration-500 flex flex-col justify-end p-8">
                            <div class="flex gap-4">
                                <a href="#"
                                    class="w-10 h-10 rounded-xl bg-white/20 backdrop-blur-md flex items-center justify-center text-white hover:bg-amber-500 transition-all"><i
                                        data-lucide="linkedin" class="w-4 h-4"></i></a>
                                <a href="#"
                                    class="w-10 h-10 rounded-xl bg-white/20 backdrop-blur-md flex items-center justify-center text-white hover:bg-amber-500 transition-all"><i
                                        data-lucide="mail" class="w-4 h-4"></i></a>
                            </div>
                        </div>
                    </div>
                    <h3 class="text-2xl font-black text-slate-900 tracking-tight">Jane Smith</h3>
                    <p class="text-primary font-bold text-xs uppercase tracking-widest mt-1">Quality Control Specialist
                    </p>
                </div>

                <!-- Team Member 3 -->
                <div class="group">
                    <div
                        class="relative aspect-[4/5] rounded-[2.5rem] overflow-hidden mb-6 shadow-sm group-hover:shadow-xl transition-all duration-500 group-hover:-translate-y-2">
                        <img src="https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?auto=format&fit=crop&q=80&w=400"
                            alt="Team Member"
                            class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700">
                        <div
                            class="absolute inset-0 bg-gradient-to-t from-primary/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-all duration-500 flex flex-col justify-end p-8">
                            <div class="flex gap-4">
                                <a href="#"
                                    class="w-10 h-10 rounded-xl bg-white/20 backdrop-blur-md flex items-center justify-center text-white hover:bg-amber-500 transition-all"><i
                                        data-lucide="linkedin" class="w-4 h-4"></i></a>
                                <a href="#"
                                    class="w-10 h-10 rounded-xl bg-white/20 backdrop-blur-md flex items-center justify-center text-white hover:bg-amber-500 transition-all"><i
                                        data-lucide="mail" class="w-4 h-4"></i></a>
                            </div>
                        </div>
                    </div>
                    <h3 class="text-2xl font-black text-slate-900 tracking-tight">Robert Brown</h3>
                    <p class="text-primary font-bold text-xs uppercase tracking-widest mt-1">CNC Operations Head</p>
                </div>

                <!-- Team Member 4 -->
                <div class="group">
                    <div
                        class="relative aspect-[4/5] rounded-[2.5rem] overflow-hidden mb-6 shadow-sm group-hover:shadow-xl transition-all duration-500 group-hover:-translate-y-2">
                        <img src="https://images.unsplash.com/photo-1580489944761-15a19d654956?auto=format&fit=crop&q=80&w=400"
                            alt="Team Member"
                            class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700">
                        <div
                            class="absolute inset-0 bg-gradient-to-t from-primary/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-all duration-500 flex flex-col justify-end p-8">
                            <div class="flex gap-4">
                                <a href="#"
                                    class="w-10 h-10 rounded-xl bg-white/20 backdrop-blur-md flex items-center justify-center text-white hover:bg-amber-500 transition-all"><i
                                        data-lucide="linkedin" class="w-4 h-4"></i></a>
                                <a href="#"
                                    class="w-10 h-10 rounded-xl bg-white/20 backdrop-blur-md flex items-center justify-center text-white hover:bg-amber-500 transition-all"><i
                                        data-lucide="mail" class="w-4 h-4"></i></a>
                            </div>
                        </div>
                    </div>
                    <h3 class="text-2xl font-black text-slate-900 tracking-tight">Sarah Wilson</h3>
                    <p class="text-primary font-bold text-xs uppercase tracking-widest mt-1">Design & Prototyping</p>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-root"></div>

    <script src="./public/js/main.js"></script>
</body>

</html>
